# Site settings
title: Z. Wang # site title
description: personal website
lang: en-US # default lang
timezone: Asia/Tokyo # set your timezone
image: assets/img/ogp.png # This image used for Open Graph more info https://ogp.me/
repo: https://github.com/wongzit/wongzit.github.io # site repo [optional]
mode: dark # default theme "dark" | "light"

# Profile settings
author:
  name: Zhe Wang # author name
  bio: >- # tell to the world
    PhD student in organic chemistry and programmer.
  username: username # general username
  github: wongzit # github username
  twitter: oooooootetsu # twitter username
  facebook: facebook_username # facebook username
  email: wongzit@yahoo.co.jp # email adress
  avatar: /assets/img/profile.png # change with your own avatar
  googlescholar    : "https://scholar.google.co.jp/citations?user=gzUh6CMAAAAJ&hl=ja&oi=sra"
  email            : "wongzit@yahoo.co.jp"
  researchgate     : "https://www.researchgate.net/profile/Zhe-Wang-84"
  uri              :
  bitbucket        :
  codepen          :
  dribbble         :
  flickr           :
  facebook         : "https://www.facebook.com/profile.php?id=100004305313075"
  foursquare       :
  github           : "wongzit"
  google_plus      :
  keybase          :
  instagram        : "https://www.instagram.com/tetsu_____/"
  impactstory      : 
  lastfm           :
  linkedin         :
  orcid            : "http://orcid.org/0000-0002-9996-586X"
  pinterest        :
  soundcloud       :
  stackoverflow    : # http://stackoverflow.com/users/123456/username
  steam            :
  tumblr           :
  twitter          : "ooooooootetsu"
  vine             :
  weibo            :
  xing             :
  youtube          :
  wikipedia        :

# URL settings
url: "https://wongzit.github.io" #
baseurl:
permalink: /:title/
google_analytics: # leave it blank if not wish
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Homepage limit posts
number_of_posts: 5

# Build settings
# theme: klise
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - lighthouse.png
  - klise-*.gem
  - klise.gemspec

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles
